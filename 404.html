<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'none'; script-src 'unsafe-inline'; upgrade-insecure-requests"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
  </head>
  <body>
    <script>
      (function () {
        var target = window.location.pathname + window.location.search + window.location.hash;
        window.sessionStorage.setItem("sunny-spa-redirect", target);
        window.location.replace("/");
      })();
    </script>
  </body>
  </html>
